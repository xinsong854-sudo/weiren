<!DOCTYPE html>

        .bg-street { background: linear-gradient(180deg, #0c0c0c 0%, #1a1a2e 100%); }
        .bg-home { background: linear-gradient(180deg, #2d3436 0%, #0c0c0c 100%); }
        .bg-forum { background: linear-gradient(180deg, #1a0a0a 0%, #2a1a1a 100%); }
        .bg-ending { background: #000; }
        
        /* 对话框 */
        #dialogue-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1000px; background: rgba(20,20,40,0.95); border: 2px solid #4a4a6a; border-radius: 15px; padding: 20px 30px; z-index: 10; display: none; }
        #speaker-name { font-size: 20px; font-weight: bold; color: #7a7aaa; margin-bottom: 10px; }
        #dialogue-text { font-size: 18px; line-height: 1.8; color: #fff; min-height: 60px; }
        
        /* 选项 */
        #choices-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; display: none; flex-direction: column; gap: 15px; width: 80%; max-width: 600px; }
        .choice-btn { background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%); border: 2px solid #5a5a7a; border-radius: 10px; padding: 20px; color: #fff; font-size: 18px; cursor: pointer; text-align: center; transition: all 0.3s; }
        .choice-btn:hover { background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%); border-color: #7a7aaa; transform: scale(1.02); }
        
        /* 标题界面 */
        #title-screen { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #title-screen h1 { font-size: 48px; color: #7a7aaa; margin-bottom: 20px; text-shadow: 0 0 20px rgba(122,122,170,0.5); }
        .subtitle { font-size: 18px; color: #5a5a7a; margin-bottom: 30px; }
        #name-input-container { display: none; flex-direction: column; align-items: center; margin-bottom: 20px; }
        #player-name-input { background: rgba(30,30,50,0.8); border: 2px solid #5a5a7a; border-radius: 8px; padding: 12px 20px; color: #fff; font-size: 16px; width: 250px; text-align: center; margin-bottom: 15px; }
        #player-name-input:focus { outline: none; border-color: #7a7aaa; }
        .name-hint { font-size: 12px; color: #5a5a7a; margin-top: 10px; }
        .title-btn { background: #3a3a5a; border: 2px solid #5a5a7a; border-radius: 10px; padding: 15px 50px; color: #fff; font-size: 18px; cursor: pointer; margin: 10px; transition: all 0.3s; }
        .title-btn:hover { background: #4a4a6a; border-color: #7a7aaa; transform: scale(1.05); }
        
        /* 结局界面 */
        #ending-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        #ending-screen h2 { font-size: 36px; color: #7a7aaa; margin-bottom: 20px; text-align: center; }
        #ending-screen .ending-text { font-size: 18px; line-height: 2; color: #aaa; max-width: 700px; text-align: center; white-space: pre-line; }
        .ending-bad { color: #ff6b6b; }
        .ending-normal { color: #4ecdc4; }
        .ending-true { color: #ffe66d; }
        
        /* 检定 UI */
        #check-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; background: rgba(20,20,40,0.98); border: 3px solid #7a7aaa; border-radius: 15px; padding: 25px; z-index: 100; display: none; text-align: center; }
        #check-ui h3 { color: #7a7aaa; margin-bottom: 15px; font-size: 24px; }
        .check-info { margin: 10px 0; color: #aaa; font-size: 16px; }
        #check-result { margin-top: 20px; font-size: 22px; font-weight: bold; white-space: pre-line; line-height: 1.6; }
        
        /* 车卡 UI 按钮 */
        #char-sheet-btn { position: fixed; top: 10px; right: 10px; background: #2a2a4a; border: 2px solid #4a4a6a; color: #4ecdc4; padding: 8px 15px; border-radius: 8px; cursor: pointer; z-index: 100; font-size: 14px; transition: all 0.3s; }
        #char-sheet-btn:hover { background: #3a3a5a; border-color: #7a7aaa; }
        
        /* 车卡面板 */
        #char-sheet { display: none; position: fixed; top: 50px; right: 10px; width: 280px; background: rgba(20,20,40,0.98); border: 2px solid #4a4a6a; border-radius: 10px; padding: 15px; z-index: 99; font-size: 13px; }
        #char-sheet h3 { color: #4ecdc4; margin: 0 0 10px 0; font-size: 18px; }
        #char-name { color: #fff; margin-bottom: 10px; }
        .char-section { border-top: 1px solid #4a4a6a; padding-top: 10px; margin-top: 10px; }
        .char-section-title { color: #aaa; margin-bottom: 5px; font-size: 12px; }
        .char-stat-row { display: flex; justify-content: space-between; padding: 3px 0; }
        .char-stat-label { color: #aaa; }
        .char-stat-value { color: #4ecdc4; }

        #menu-buttons { position: absolute; top: 20px; right: 20px; z-index: 30; display: flex; gap: 10px; }
        .menu-btn { background: rgba(30,30,50,0.8); border: 1px solid #5a5a7a; border-radius: 5px; padding: 8px 15px; color: #aaa; cursor: pointer; transition: all 0.3s; }

        @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.3; } }
    </style>
</head>
<body>
<div id="game-container">
    <div id="background" class="bg-office"></div>
    
    <div id="menu-buttons">
        <button class="menu-btn" onclick="showTitle()">🏠 标题</button>
    </div>
    
    <!-- 标题界面 -->

            <p class="name-hint">💡 输入官方角色名有彩蛋（安诺涅、烛灯等）</p>
        </div>
        
        <button class="title-btn" id="start-btn" onclick="showNameInput()">🎮 开始游戏</button>
    </div>
    
    <!-- 对话框 -->
    <div id="dialogue-box" onclick="nextDialogue()">

        <div id="dialogue-text"></div>
        <div id="continue-indicator" style="display: none;">▼</div>

    <!-- 选项容器 -->

    <!-- 检定 UI -->

        <div id="check-roll" class="check-info"></div>
        <div id="check-target" class="check-info"></div>
        <div id="check-result"></div>
    </div>
    
    <!-- 车卡按钮 -->
    <button id="char-sheet-btn" onclick="toggleCharSheet(event)">📋 车卡</button>
    
    <!-- 车卡面板 -->
    <div id="char-sheet">

        <div id="char-name"></div>
        <div class="char-section">
            <div class="char-section-title">【属性】</div>
            <div id="char-stats"></div>
        </div>
        <div class="char-section">
            <div class="char-section-title">【技能】</div>
            <div id="char-skills"></div>
        </div>
        <button onclick="toggleCharSheet(event)" style="margin-top:10px;width:100%;background:#3a3a5a;border:none;color:#fff;padding:8px;border-radius:5px;cursor:pointer;">关闭</button>
    </div>
    
    <!-- 结局界面 -->
    <div id="ending-screen">
        <h2 id="ending-title"></h2>
        <div id="ending-text" class="ending-text"></div>
        <button class="title-btn" onclick="showTitle()" style="margin-top:30px;">🔄 重新开始</button>

// ===== 游戏引擎 =====
function showTitle() {
    document.getElementById('ending-screen').style.display = 'none';
    document.getElementById('dialogue-box').style.display = 'none';
    document.getElementById('choices-container').style.display = 'none';
    document.getElementById('title-screen').style.display = 'flex';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('name-input-container').style.display = 'none';
}

function showNameInput() {
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('name-input-container').style.display = 'flex';
    document.getElementById('player-name-input').focus();
}

function confirmName() {
    try {
        const input = document.getElementById('player-name-input');
        const nameValue = input.value.trim();
        
        if (!nameValue || nameValue.length === 0) {
            alert('⚠️ 请输入你的名字！');
            input.focus();
            return;
        }
        
        playerName = nameValue;
        
        // 检查是否是官方角色
        let officialChar = officialChars[playerName];
        if (!officialChar) {
            // 检查别名
            for (const [key, char] of Object.entries(officialChars)) {
                if (easterEggRoles[playerName] && easterEggRoles[playerName].includes(char.background)) {
                    officialChar = char;
                    break;
                }
            }
        }
        
        if (officialChar) {
            // 彩蛋角色：使用官方属性
            isEasterEgg = true;
            easterEggRole = playerName;
            playerCharacter = {
                name: playerName,
                stats: { ...officialChar.stats },
                skills: { 侦查：15, 心理学：15, 伪装：10, 急救：5, 生存：10 },
                background: officialChar.background
            };
            alert('🎉 彩蛋解锁：' + playerName + '\n身份：' + officialChar.background);
        } else {
            // 普通人：随机分配属性
            let remaining = 250;
            let stats = {};
            const statKeys = ['SAN', 'INS', 'DIS', 'LUK', 'SUR'];
            
            for (let i = 0; i < 4; i++) {
                const min = Math.max(20, remaining - 60 * (4 - i));
                const max = Math.min(60, remaining - 20 * (4 - i));
                const value = Math.floor(Math.random() * (max - min + 1)) + min;
                stats[statKeys[i]] = value;
                remaining -= value;
            }
            stats[statKeys[4]] = remaining;
            
            // 随机技能分配
            const skills = { 侦查：0, 心理学：0, 伪装：0, 急救：0, 生存：0 };
            let skillRemaining = 30;
            const skillKeys = Object.keys(skills);
            for (let i = 0; i < 4; i++) {
                const add = Math.floor(Math.random() * (skillRemaining / (5 - i) + 1));
                skills[skillKeys[i]] = add;
                skillRemaining -= add;
            }
            skills[skillKeys[4]] = skillRemaining;
            
            isEasterEgg = false;
            playerCharacter = {
                name: playerName,
                stats: stats,
                skills: skills,
                background: '普通人'
            };
        }
        
        // 检查普通彩蛋
        if (!isEasterEgg && easterEggRoles[playerName]) {
            isEasterEgg = true;
            easterEggRole = playerName;
            alert('🎉 彩蛋解锁：' + playerName + '\n身份：' + easterEggRoles[playerName]);
        }
        
        // 隐藏标题界面，直接开始游戏
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('dialogue-box').style.display = 'block';
        loadScene('start');
    } catch(e) {
        console.error('confirmName error:', e);
        alert('错误：' + e.message);
    }
}

function loadScene(sceneId) {
    const scene = scenes[sceneId];
    if (!scene) {
        console.error('Scene not found:', sceneId);
        return;
    }
    
    currentScene = sceneId;
    dialogueIndex = 0;
    
    // 隐藏选项
    document.getElementById('choices-container').style.display = 'none';
    
    // 设置背景
    const bg = document.getElementById('background');
    bg.className = scene.bg || 'bg-office';
    
    // 检查是否是结局
    if (endings[sceneId]) {
        showEnding(endings[sceneId]);
        return;
    }
    
    // 显示第一句对话
    showDialogue(scene.dialogues[0]);
    
    // 如果只有一句对话且有选项，直接显示
    if (scene.dialogues.length === 1 && scene.choices) {
        showChoices(scene.choices);
    }
}

function showDialogue(dialogue) {
    const speakerEl = document.getElementById('speaker-name');
    const textEl = document.getElementById('dialogue-text');
    
    // 显示说话者名字
    let speakerName = dialogue.speaker || '';
    speakerEl.textContent = speakerName;
    
    currentText = dialogue.text || '';
    
    // 替换占位符
    if (playerName) {
        currentText = currentText.replace(/\{\{PLAYER_NAME\}\}/g, playerName);
    }
    
    // 显示对话
    textEl.innerHTML = currentText.replace(/\n/g, '<br>');
    
    document.getElementById('dialogue-box').style.display = 'block';
    document.getElementById('continue-indicator').style.display = 'block';
}

function showChoices(choices) {
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    
    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        
        if (choice.onclick) {
            btn.onclick = (e) => {
                e.stopPropagation();
                window[choice.onclick]();
                setTimeout(() => {
                    loadScene(choice.next);
                }, 3500);
            };
        } else {
            btn.onclick = (e) => {
                e.stopPropagation();
                loadScene(choice.next);
            };
        }
        
        container.appendChild(btn);
    });
    
    container.style.display = 'flex';
}

function nextDialogue() {
    const scene = scenes[currentScene];
    if (!scene) return;
    
    dialogueIndex++;
    
    if (dialogueIndex < scene.dialogues.length) {
        showDialogue(scene.dialogues[dialogueIndex]);
        
        // 如果是最后一句对话且有选项，显示选项
        if (dialogueIndex === scene.dialogues.length - 1 && scene.choices) {
            showChoices(scene.choices);
        }
    }
}

function showEnding(ending) {
    const screen = document.getElementById('ending-screen');
    const titleEl = document.getElementById('ending-title');
    const textEl = document.getElementById('ending-text');
    
    titleEl.textContent = ending.endingTitle;
    titleEl.className = ending.endingType === 'bad' ? 'ending-bad' : 
                        ending.endingType === 'true' ? 'ending-true' : 'ending-normal';
    
    textEl.textContent = ending.endingText;
    textEl.className = 'ending-text ' + (ending.endingType === 'bad' ? 'ending-bad' : 
                                         ending.endingType === 'true' ? 'ending-true' : 'ending-normal');
    
    screen.style.display = 'flex';
    document.getElementById('dialogue-box').style.display = 'none';
    document.getElementById('choices-container').style.display = 'none';
}

// ===== 检定系统 =====
function rollCheck(attribute, skill, dc, description) {
    if (!playerCharacter) return null;
    
    const attrValue = playerCharacter.stats[attribute] || 50;
    const skillValue = playerCharacter.skills[skill] || 0;
    const targetValue = attrValue + skillValue;
    const effectiveDC = dc;
    
    const roll = Math.floor(Math.random() * 100) + 1;
    
    let result;
    if (roll <= 5) {
        result = '大成功';
    } else if (roll >= 96) {
        result = '大失败';
    } else if (roll <= targetValue - effectiveDC + 50) {
        result = '成功';
    } else {
        result = '失败';
    }
    
    return {
        roll,
        targetValue,
        dc,
        result,
        description,
        attribute,
        attrValue,
        skill,
        skillValue
    };
}

function showCheckResult(check) {
    const ui = document.getElementById('check-ui');
    const attrLabels = { SAN: '理智', INS: '洞察', DIS: '伪装', LUK: '幸运', SUR: '生存' };
    
    const targetValue = check.attrValue + check.skillValue;
    const successThreshold = targetValue - check.dc + 50;
    
    document.getElementById('check-description').textContent = check.description;
    document.getElementById('check-attr').textContent = attrLabels[check.attribute] + ': ' + check.attrValue;
    document.getElementById('check-skill').textContent = check.skill + ': ' + check.skillValue;
    document.getElementById('check-dc').textContent = 'DC: ' + check.dc;
    document.getElementById('check-roll').textContent = '🎲 骰子：' + check.roll;
    document.getElementById('check-target').textContent = '目标值：' + targetValue + ' (成功线：' + successThreshold + ')';
    
    const resultEl = document.getElementById('check-result');
    let resultText = '';
    if (check.result === '大成功') {
        resultText = '🎉 大成功！(骰子≤5)\n骰子 ' + check.roll + ' ≤ 成功线 ' + successThreshold + '，完美通过！';
        resultEl.style.color = '#ffe66d';
    } else if (check.result === '成功') {
        resultText = '✅ 成功\n骰子 ' + check.roll + ' ≤ 成功线 ' + successThreshold + '，检定通过！';
        resultEl.style.color = '#4ecdc4';
    } else if (check.result === '失败') {
        resultText = '❌ 失败\n骰子 ' + check.roll + ' > 成功线 ' + successThreshold + '，检定未通过';
        resultEl.style.color = '#ff6b6b';
    } else {
        resultText = '💀 大失败！(骰子≥96)\n骰子 ' + check.roll + '，灾难性失败！';
        resultEl.style.color = '#ff0000';
    }
    resultEl.textContent = resultText;
    resultEl.style.whiteSpace = 'pre-line';
    resultEl.style.lineHeight = '1.6';
    
    ui.style.display = 'block';
    
    setTimeout(() => {
        ui.style.display = 'none';
    }, 4000);
    
    return check.result;
}

// INS 检定
function doInsCheck() {
    const check = rollCheck('INS', '侦查', 50, '仔细观察张明的行为');
    if (check) {
        showCheckResult(check);
    }
}

// 车卡 UI
function toggleCharSheet(event) {
    if (event) event.stopPropagation();
    const sheet = document.getElementById('char-sheet');
    const btn = document.getElementById('char-sheet-btn');
    
    if (sheet.style.display === 'none' || !sheet.style.display) {
        if (playerCharacter) {
            document.getElementById('char-name').innerHTML = '👤 <b>' + playerCharacter.name + '</b> (' + playerCharacter.background + ')';
            
            const statsHtml = Object.entries(playerCharacter.stats).map(([k, v]) => {
                const labels = { SAN: '理智', INS: '洞察', DIS: '伪装', LUK: '幸运', SUR: '生存' };
                return '<div class="char-stat-row"><span class="char-stat-label">' + labels[k] + '</span><span class="char-stat-value">' + v + '</span></div>';
            }).join('');
            document.getElementById('char-stats').innerHTML = statsHtml;
            
            const skillsHtml = Object.entries(playerCharacter.skills).filter(([_, v]) => v > 0).map(([k, v]) => {
                return '<div class="char-stat-row"><span class="char-stat-label">' + k + '</span><span class="char-stat-value">' + v + '</span></div>';
            }).join('') || '<div style="color:#666;">无</div>';
            document.getElementById('char-skills').innerHTML = skillsHtml;
        }
        sheet.style.display = 'block';
        btn.style.display = 'none';
    } else {
        sheet.style.display = 'none';
        btn.style.display = 'block';
    }
}
